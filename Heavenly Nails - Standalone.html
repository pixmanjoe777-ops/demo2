ve;\n}\n.nav-links a.btn { color: var(--accent-ink); }\n.nav-links a.btn:hover { color: var(--accent-ink); }\n.nav-links a.active { color: var(--ink); }\n.nav-links a.active::after {\n  content: \"\"; position: absolute; left: 0; right: 0; bottom: -6px;\n  height: 1px; background: var(--accent);\n}\n\n/* Buttons */\n.btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  padding: 14px 22px;\n  border-radius: 999px;\n  font-family: var(--font-body);\n  font-weight: 500;\n  font-size: 14px;\n  letter-spacing: 0.02em;\n  border: 1px solid var(--accent);\n  background: var(--accent); color: var(--accent-ink);\n  cursor: pointer;\n  transition: transform .15s ease, background .2s ease;\n}\n.btn:hover { transform: translateY(-1px); color: var(--accent-ink); }\n.btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }\n.btn.ghost:hover { border-color: var(--ink); color: var(--ink); }\n.btn.lg { padding: 18px 28px; font-size: 15px; }\n\n/* CTA variants (toggled by body[data-cta]) */\nbody[data-cta=\"pill\"] .btn { border-radius: 999px; }\nbody[data-cta=\"square\"] .btn { border-radius: 4px; }\nbody[data-cta=\"underline\"] .btn {\n  background: transparent; color: var(--accent);\n  border: none; border-bottom: 1px solid var(--accent);\n  border-radius: 0; padding: 10px 2px;\n}\nbody[data-cta=\"outline\"] .btn {\n  background: transparent; color: var(--accent);\n}\nbody[data-cta=\"outline\"] .btn:hover { background: var(--accent); color: var(--accent-ink); }\n\n/* Cards */\n.card {\n  background: var(--card);\n  border: 1px solid var(--line);\n  border-radius: var(--radius);\n  padding: 28px;\n}\n\n/* Section */\n.section { padding: 96px 0; }\n.section-tight { padding: 64px 0; }\n.section-head { max-width: 680px; margin: 0 0 48px; }\n.section-head .eyebrow { display: block; margin-bottom: 14px; }\n\n/* Placeholder striped image */\n.ph {\n  position: relative;\n  background:\n    repeating-linear-gradient(135deg,\n      color-mix(in okla oot massage.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"svc-card\">\n          <div class=\"svc-ph ph\"><span class=\"ph-label\">nailart.jpg<\u002Fspan><\u002Fdiv>\n          <span class=\"price\">FROM $10<\u002Fspan>\n          <h3>Nail Art &amp; Designs<\u002Fh3>\n          <p>French, chrome, decals, hand-painted florals. Per-nail pricing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CALLOUT / PROMO -->\n  <section class=\"wrap\">\n    <div class=\"callout\">\n      <div>\n        <span class=\"eyebrow\" style=\"color:var(--accent)\">First visit<\u002Fspan>\n        <h2 style=\"margin-top:12px\">A complimentary <span class=\"accent\">paraffin<\u002Fspan><br>treatment, on us.<\u002Fh2>\n        <p style=\"color:color-mix(in oklab, var(--bg) 70%, transparent); font-size:17px; max-width:46ch; margin-top:20px\">\n          Book any manicure or pedicure as a new guest and we'll add a warm paraffin hand dip —\n          the softest way to meet us. Mention code <strong style=\"color:var(--accent)\">HEAVENLY10<\u002Fstrong> when you book.\n        <\u002Fp>\n        <div style=\"margin-top:28px;display:flex;gap:12px;flex-wrap:wrap\">\n          <a href=\"book.html\" class=\"btn lg\">Claim your first visit →<\u002Fa>\n          <a href=\"tel:18474864131\" class=\"btn ghost lg\" style=\"color:var(--bg);border-color:color-mix(in oklab, var(--bg) 30%, transparent)\">Or call (847) 486-4131<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"callout-meta\">\n        <span>Offer<\u002Fspan><strong>Complimentary paraffin hand treatment<\u002Fstrong>\n        <span style=\"margin-top:20px\">Minimum<\u002Fspan><strong>Any mani or pedi service<\u002Fstrong>\n        <span style=\"margin-top:20px\">New guests<\u002Fspan><strong>First visit only<\u002Fstrong>\n        <span style=\"margin-top:20px\">Valid through<\u002Fspan><strong>Dec 31, 2026<\u002Fstrong>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsectio rap\">\n      <div class=\"section-head\">\n        <span class=\"eyebrow\">The room<\u002Fspan>\n        <h2>Four technicians. Decades of hands.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"team-grid\">\n        <div class=\"team-card\">\n          <div class=\"ph\"><span class=\"ph-label\">linh.jpg · 4:5<\u002Fspan><\u002Fdiv>\n          <span class=\"role\">Owner · 22 yrs<\u002Fspan>\n          <h4>Linh Tran<\u002Fh4>\n          <p class=\"spec\">Classic &amp; French manicures, gel structure, mother-of-pearl inlay.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"team-card\">\n          <div class=\"ph\"><span class=\"ph-label\">thuy.jpg · 4:5<\u002Fspan><\u002Fdiv>\n          <span class=\"role\">Senior artist · 14 yrs<\u002Fspan>\n          <h4>Thuy Nguyen<\u002Fh4>\n          <p class=\"spec\">Nail art, chrome &amp; cat-eye, hand-painted florals, weddings.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"team-card\">\n          <div class=\"ph\"><span class=\"ph-label\">anh.jpg · 4:5<\u002Fspan><\u002Fdiv>\n          <span class=\"role\">Pedicure specialist · 9 yrs<\u002Fspan>\n          <h4>Anh Pham<\u002Fh4>\n          <p class=\"spec\">Waterless pedicures, callus work, reflexology-trained foot massage.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"team-card\">\n          <div class=\"ph\"><span class=\"ph-label\">mai.jpg · 4:5<\u002Fspan><\u002Fdiv>\n          <span class=\"role\">Technician · 6 yrs<\u002Fspan>\n          <h4>Mai Le<\u002Fh4>\n          <p class=\"spec\">Dip powder, extensions, men's manicures, kids' manicures.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT STRIP -->\n  <section class=\"section\">\n    <div class=\"wrap\">\n      <div class=\"about\">\n        <div class=\"ph\"><span class=\"ph-label\">interior/front-room.jpg · 4:5<\u002Fspan><\u002Fdiv>\n        <div>\n          <span class=\"eyebrow\">Our story<\u002Fspan>\n          <h2 style=\"margin-top:12px\">A neighborhood salon<br>run like a favorite restaurant.<\u002Fh2>\n          <p style=\"font-size:17px; margin-top:24px\">\n            Linh Tran opened Heavenly Nails in 2004 on a quiet stretch of Waukegan Road\n            with a simple idea — treat every pair of hands like they belonged to a friend.\n            Twenty-two years later, most of our book is still neighbors.\n          <\u002Fp>\n          <p style=\"font-size:17px\">\n            We use fume-extracted stations, hospital-grade sterilization,\n            and polish lines we'd put on our own kids — because most of our guests come with theirs.\n          <\u002Fp>\n          <a href=\"contact.html\" class=\"btn ghost\" style=\"margin-top:8px\">Meet us in person →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INSTAGRAM -->\n  <section class=\"section\" style=\"padding-top:0\">\n    <div class=\"wrap\">\n      <div class=\"ig-head\">\n        <div>\n          <span class=\"eyebrow\">@heavenlynails.glenview<\u002Fspan>\n          <h2 style=\"margin-top:8px; font-size: clamp(28px, 3vw, 40px)\">Freshly painted.<\u002Fh2>\n        <\u002Fdiv>\n        <a href=\"#\" class=\"btn ghost\">Follow on Instagram →<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"ig-grid\">\n        <div class=\"ph\"><span class=\"ph-label\">01<\u002Fspan><\u002Fdiv>\n        <div class=\"ph\"><span class=\"ph-label\">02<\u002Fspan><\u002Fdiv>\n        <div class=\"ph\"><span class=\"ph-label\">03<\u002Fspan><\u002Fdiv>\n        <div class=\"ph\"><span class=\"ph-label\">04<\u002Fspan><\u002Fdiv>\n        <div class=\"ph\"><span class=\"ph-label\">05<\u002Fspan><\u002Fdiv>\n        <div class=\"ph\"><span class=\"ph-label\">06<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<div id=\"site-footer\"><\u002Fdiv>\n\n<script src=\"1da99f83-96df-4525-8352-bc6d87a5d999\"><\u002Fscript>\n<script>HNS.bootstrap(\"home\");<\u002Fscript>\n\n\n<\u002Fbody>
